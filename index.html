<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏰 DUNGEON LEAP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        .game-wrapper {
            background: #1a1a2a;
            padding: 20px;
            border-radius: 24px;
            border: 3px solid #8b0000;
            box-shadow: 0 0 30px #8b000088;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 12px;
            border: 2px solid #4a0000;
            background: #0d0d15;
            cursor: pointer;
        }
        .ui-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 8px 0 8px;
            color: #d4af37;
            text-shadow: 2px 2px 0 #4a0000;
            font-size: 24px;
            font-weight: bold;
        }
        .hearts { color: #ff4444; font-size: 28px; letter-spacing: 4px; }
        .coins { color: #ffd700; }
        button {
            background: #2a1a1a;
            color: #d4af37;
            border: 2px solid #8b0000;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #4a0000;
            transition: 0.1s;
            margin-top: 12px;
            width: 100%;
        }
        button:active { transform: translateY(4px); box-shadow: none; }
        .hidden { display: none; }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .overlay-box {
            background: #1a1a2a; padding: 30px; border-radius: 30px;
            border: 3px solid #8b0000; text-align: center; color: #d4af37;
        }
        .overlay-box h2 { font-size: 36px; margin-bottom: 16px; }
        .overlay-box button {
            background: #8b0000; color: #d4af37; border: none;
            padding: 14px 30px; font-size: 20px; margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="ui-panel">
        <span class="hearts" id="hearts">❤️❤️❤️</span>
        <span class="coins">💰 <span id="score">0</span></span>
    </div>
    <canvas id="canvas" width="800" height="400"></canvas>
    <button id="restartBtn">🔄 НАЧАТЬ ЗАНОВО</button>
</div>
<div id="gameOverlay" class="overlay hidden">
    <div class="overlay-box">
        <h2 id="overlayTitle">💀 ВЫ ПОГИБЛИ</h2>
        <p id="overlayMessage">Крысы загрызли эльфа...</p>
        <button onclick="location.reload()">🔄 ИГРАТЬ СНОВА</button>
    </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    // Игрок
    const player = {
        x: 50, y: 300, width: 30, height: 40,
        vx: 0, vy: 0, speed: 4, jumpPower: -9,
        health: 3, maxHealth: 3,
        grounded: false
    };
    
    // Управление
    const keys = { a: false, d: false, space: false };
    
    // Мир
    let platforms = [];
    let coins = [];
    let enemies = [];
    let spikes = [];
    let door = null;
    let key = null;
    let hasKey = false;
    let score = 0;
    let gameActive = true;
    let currentLevel = 1;
    
    function buildLevel() {
        platforms = [
            { x: 0, y: 360, w: 800, h: 40 }, // пол
            { x: 200, y: 280, w: 120, h: 15 },
            { x: 450, y: 220, w: 150, h: 15 },
            { x: 650, y: 300, w: 100, h: 15 }
        ];
        
        coins = [
            { x: 250, y: 250, w: 15, h: 15, collected: false },
            { x: 500, y: 190, w: 15, h: 15, collected: false },
            { x: 700, y: 270, w: 15, h: 15, collected: false }
        ];
        
        enemies = [
            { x: 300, y: 330, w: 25, h: 25, vx: 1.5, minX: 250, maxX: 400, alive: true }
        ];
        
        spikes = [
            { x: 400, y: 345, w: 30, h: 15 }
        ];
        
        key = { x: 550, y: 190, w: 15, h: 15, collected: false };
        door = { x: 750, y: 270, w: 30, h: 60, opened: false };
    }
    
    buildLevel();
    
    function resetGame() {
        player.x = 50; player.y = 300; player.vx = 0; player.vy = 0;
        player.health = player.maxHealth;
        hasKey = false;
        score = 0;
        gameActive = true;
        currentLevel = 1;
        buildLevel();
        document.getElementById('gameOverlay').classList.add('hidden');
        updateUI();
    }
    
    function updateUI() {
        const hearts = '❤️'.repeat(player.health) + '🖤'.repeat(player.maxHealth - player.health);
        document.getElementById('hearts').textContent = hearts;
        document.getElementById('score').textContent = score;
    }
    
    function checkCollisions() {
        player.grounded = false;
        
        // Платформы
        platforms.forEach(p => {
            if (player.x < p.x + p.w && player.x + player.width > p.x &&
                player.y + player.height > p.y && player.y < p.y + p.h) {
                if (player.vy >= 0 && player.y + player.height - player.vy <= p.y) {
                    player.y = p.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                }
            }
        });
        
        // Монетки
        coins.forEach(c => {
            if (!c.collected && player.x < c.x + c.w && player.x + player.width > c.x &&
                player.y < c.y + c.h && player.y + player.height > c.y) {
                c.collected = true;
                score += 10;
                updateUI();
            }
        });
        
        // Ключ
        if (!key.collected && player.x < key.x + key.w && player.x + player.width > key.x &&
            player.y < key.y + key.h && player.y + player.height > key.y) {
            key.collected = true;
            hasKey = true;
        }
        
        // Дверь
        if (hasKey && !door.opened && player.x < door.x + door.w && player.x + player.width > door.x &&
            player.y < door.y + door.h && player.y + player.height > door.y) {
            door.opened = true;
            currentLevel++;
            if (currentLevel > 3) {
                gameActive = false;
                document.getElementById('overlayTitle').textContent = '🏆 ПОБЕДА!';
                document.getElementById('overlayMessage').textContent = 'Эльф сбежал из замка!';
                document.getElementById('gameOverlay').classList.remove('hidden');
            } else {
                player.x = 50; player.y = 300;
                buildLevel();
                hasKey = false;
            }
        }
        
        // Враги
        enemies.forEach(e => {
            if (!e.alive) return;
            e.x += e.vx;
            if (e.x < e.minX || e.x + e.w > e.maxX) e.vx *= -1;
            
            if (player.x < e.x + e.w && player.x + player.width > e.x &&
                player.y < e.y + e.h && player.y + player.height > e.y) {
                player.health--;
                player.x = 50; player.y = 300;
                updateUI();
                if (player.health <= 0) {
                    gameActive = false;
                    document.getElementById('gameOverlay').classList.remove('hidden');
                }
            }
        });
        
        // Шипы
        spikes.forEach(s => {
            if (player.x < s.x + s.w && player.x + player.width > s.x &&
                player.y + player.height > s.y && player.y < s.y + s.h) {
                player.health--;
                player.x = 50; player.y = 300;
                updateUI();
                if (player.health <= 0) {
                    gameActive = false;
                    document.getElementById('gameOverlay').classList.remove('hidden');
                }
            }
        });
    }
    
    function update() {
        if (!gameActive) return;
        
        // Управление
        if (keys.a) player.vx = -player.speed;
        else if (keys.d) player.vx = player.speed;
        else player.vx = 0;
        
        if (keys.space && player.grounded) {
            player.vy = player.jumpPower;
            player.grounded = false;
        }
        
        // Гравитация
        player.vy += 0.5;
        player.y += player.vy;
        player.x += player.vx;
        
        // Границы
        player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
        if (player.y > canvas.height) {
            player.health = 0;
            gameActive = false;
            document.getElementById('gameOverlay').classList.remove('hidden');
        }
        
        checkCollisions();
    }
    
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Фон
        ctx.fillStyle = '#0d0d15';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < 20; i++) {
            ctx.fillStyle = '#2a1a1a';
            ctx.beginPath();
            ctx.arc((i * 47) % canvas.width, (i * 31) % canvas.height, 2, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Платформы
        ctx.fillStyle = '#4a4a6a';
        platforms.forEach(p => {
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = '#3a3a5a';
            ctx.fillRect(p.x, p.y, p.w, 5);
            ctx.fillStyle = '#4a4a6a';
        });
        
        // Монетки
        ctx.fillStyle = '#ffd700';
        ctx.shadowColor = '#ffaa00';
        ctx.shadowBlur = 10;
        coins.forEach(c => { if (!c.collected) ctx.fillRect(c.x, c.y, c.w, c.h); });
        
        // Ключ
        if (!key.collected) {
            ctx.fillStyle = '#d4af37';
            ctx.fillRect(key.x, key.y, key.w, key.h);
        }
        
        // Дверь
        ctx.fillStyle = door.opened ? '#5a3a1a' : '#8b4513';
        ctx.fillRect(door.x, door.y, door.w, door.h);
        if (!door.opened) {
            ctx.fillStyle = '#d4af37';
            ctx.beginPath();
            ctx.arc(door.x + 20, door.y + 30, 5, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Шипы
        ctx.fillStyle = '#8b0000';
        ctx.shadowBlur = 0;
        spikes.forEach(s => { ctx.fillRect(s.x, s.y, s.w, s.h); });
        
        // Враги
        ctx.fillStyle = '#2a5a2a';
        ctx.shadowColor = '#0f0';
        ctx.shadowBlur = 8;
        enemies.forEach(e => { if (e.alive) ctx.fillRect(e.x, e.y, e.w, e.h); });
        
        // Игрок (эльф)
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#2a8a4a';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.fillStyle = '#1a6a3a';
        ctx.fillRect(player.x + 5, player.y - 10, 8, 15); // уши
        ctx.fillRect(player.x + 17, player.y - 10, 8, 15);
        ctx.fillStyle = '#d4af37';
        ctx.fillRect(player.x + 10, player.y + 5, 10, 5); // пояс
        
        ctx.shadowBlur = 0;
    }
    
    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    // Управление
    window.addEventListener('keydown', (e) => {
        if (e.key === 'a' || e.key === 'A') keys.a = true;
        if (e.key === 'd' || e.key === 'D') keys.d = true;
        if (e.key === ' ') { e.preventDefault(); keys.space = true; }
    });
    window.addEventListener('keyup', (e) => {
        if (e.key === 'a' || e.key === 'A') keys.a = false;
        if (e.key === 'd' || e.key === 'D') keys.d = false;
        if (e.key === ' ') { e.preventDefault(); keys.space = false; }
    });
    
    // Тач-управление для телефона
    let touchLeft = false, touchRight = false, touchJump = false;
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const x = touch.clientX - rect.left;
        if (x < canvas.width / 3) keys.a = true;
        else if (x > canvas.width * 2 / 3) keys.d = true;
        else keys.space = true;
    });
    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        keys.a = false; keys.d = false; keys.space = false;
    });
    
    document.getElementById('restartBtn').addEventListener('click', resetGame);
    
    updateUI();
    gameLoop();
</script>
</body>
    </html>
