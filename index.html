<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐺 Ведьмак: Выбор Судьбы</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 12px; background: #0a0c0f; color: #d4cfc4;
            font-family: 'Cinzel', 'Segoe UI', serif; min-height: 100vh;
            background-image: radial-gradient(circle at 20% 30%, #1a2a1f, #0a0c0f);
        }
        .game-container {
            max-width: 480px; margin: 0 auto; background: rgba(10, 15, 10, 0.95);
            border-radius: 32px; padding: 20px; border: 2px solid #5a6b4b;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }
        h2 {
            margin: 0 0 8px; color: #b9a57c; text-shadow: 2px 2px 0 #1e2a1a;
            display: flex; align-items: center; gap: 8px; font-size: 20px;
        }
        .years-badge {
            background: #4a2a2a; padding: 6px 16px; border-radius: 30px;
            font-size: 18px; font-weight: bold; color: #ffc0a0;
            border: 1px solid #b34a4a; text-align: center; margin-bottom: 10px;
        }
        .crisis-badge {
            background: #5a3a0a; padding: 4px 12px; border-radius: 20px;
            font-size: 14px; color: #ffd966; margin-bottom: 10px; text-align: center;
        }
        .factions {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 15px 0;
        }
        .faction-card {
            background: #1c261c; padding: 8px 4px; border-radius: 12px;
            border: 1px solid #6a7a5a; text-align: center;
        }
        .faction-name { font-size: 11px; color: #9aad8a; }
        .faction-value { font-size: 22px; font-weight: bold; }
        .north { color: #6a9aff; } .nilf { color: #ffb347; }
        .magic { color: #c26aff; } .witcher { color: #6aff8a; }

        .artifacts-panel {
            background: #1a221a; border-radius: 20px; padding: 10px; margin: 12px 0;
            border: 1px dashed #7a9a5a; display: flex; justify-content: space-around;
        }
        .artifact-btn {
            background: #2a352a; border: 1px solid #9aad8a; color: #efe0c0;
            padding: 6px 10px; border-radius: 30px; font-size: 12px; cursor: pointer;
        }
        .artifact-btn:disabled { opacity: 0.4; pointer-events: none; }

        .choice-area {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0;
        }
        .card {
            background: #1a221a; border-radius: 24px; padding: 16px 8px;
            border: 2px solid #7a9a5a; cursor: pointer; transition: 0.15s;
            text-align: center; box-shadow: 0 6px 0 #1a261a;
        }
        .card:active { transform: translateY(4px); box-shadow: 0 2px 0 #1a261a; }
        .card.disabled { opacity: 0.5; pointer-events: none; }
        .card-title { font-size: 18px; font-weight: bold; color: #e0d4b2; margin-bottom: 8px; }
        .card-desc { font-size: 12px; color: #b0b89a; margin-bottom: 8px; }
        .card-effects { font-size: 13px; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; }

        .event-log {
            background: #0e130e; border-radius: 16px; padding: 14px; margin: 16px 0;
            border-left: 6px solid #b9a57c; font-size: 14px; max-height: 80px;
            overflow-y: auto; color: #c0c8b0;
        }
        .reset-btn {
            background: #1e261e; border: 1px solid #6a7a5a; color: #b0b89a;
            padding: 12px; font-size: 14px; width: 100%; margin-top: 8px;
            border-radius: 40px; cursor: pointer;
        }
        .end-msg { font-weight: bold; text-align: center; margin-top: 10px; }
        .win { color: #6aff8a; } .lose { color: #d44; }
    </style>
</head>
<body>

<div class="game-container">
    <h2>🐺 ВЕДЬМАК: ВЫБОР СУДЬБЫ</h2>
    
    <div class="years-badge" id="yearDisplay">Год 1 / 15</div>
    <div class="crisis-badge" id="crisisDisplay">⚔️ Время мира</div>

    <!-- ФРАКЦИИ -->
    <div class="factions">
        <div class="faction-card"><span class="faction-name">🛡️ Север</span> <span class="faction-value north" id="northVal">50</span></div>
        <div class="faction-card"><span class="faction-name">☀️ Нильф</span> <span class="faction-value nilf" id="nilfVal">50</span></div>
        <div class="faction-card"><span class="faction-name">🔮 Магия</span> <span class="faction-value magic" id="magicVal">50</span></div>
        <div class="faction-card"><span class="faction-name">⚔️ Ведьмаки</span> <span class="faction-value witcher" id="witcherVal">50</span></div>
    </div>

    <!-- АРТЕФАКТЫ -->
    <div class="artifacts-panel">
        <button class="artifact-btn" id="medallionBtn" onclick="useArtifact('medallion')">🐺 Медальон (1)</button>
        <button class="artifact-btn" id="swordBtn" onclick="useArtifact('sword')">⚔️ Рунный меч (1)</button>
        <button class="artifact-btn" id="bookBtn" onclick="useArtifact('book')">📖 Книга чар (1)</button>
    </div>

    <!-- КАРТЫ ВЫБОРА -->
    <div class="choice-area">
        <div class="card" id="leftCard" onclick="makeChoice(0)">
            <div class="card-title" id="leftTitle">—</div>
            <div class="card-desc" id="leftDesc">—</div>
            <div class="card-effects" id="leftEff">—</div>
        </div>
        <div class="card" id="rightCard" onclick="makeChoice(1)">
            <div class="card-title" id="rightTitle">—</div>
            <div class="card-desc" id="rightDesc">—</div>
            <div class="card-effects" id="rightEff">—</div>
        </div>
    </div>

    <div class="event-log" id="eventLog">Геральт, твои решения определят судьбу Севера...</div>

    <button class="reset-btn" onclick="resetGame()">🔄 НАЧАТЬ ЗАНОВО</button>
    <div id="endMsg" class="end-msg"></div>
</div>

<script>
    // ---------- СОСТОЯНИЕ ----------
    let factions = { north: 50, nilfgaard: 50, magic: 50, witcher: 50 };
    let artifacts = { medallion: 1, sword: 1, book: 1 };
    let year = 1;
    const MAX_YEAR = 15;
    let gameOver = false;
    let gameWin = false;
    let currentCrisis = null;

    // Огромная колода (30+ карт)
    const deck = [
        { title: "Помочь крестьянам", desc: "Селяне просят защиты.", eff: { north: 8, nilfgaard: -4, magic: -2, witcher: 5 } },
        { title: "Договор с Нильфгаардом", desc: "Империя предлагает мир.", eff: { north: -6, nilfgaard: 12, magic: -2, witcher: -4 } },
        { title: "Совет чародеек", desc: "Ложа собирает силы.", eff: { north: -4, nilfgaard: -4, magic: 15, witcher: 2 } },
        { title: "Охота на грифона", desc: "Заказ из Каэр Морхен.", eff: { north: 3, nilfgaard: -2, magic: 0, witcher: 12 } },
        { title: "Поддержать партизан", desc: "Темерские повстанцы.", eff: { north: 10, nilfgaard: -8, magic: -4, witcher: 2 } },
        { title: "Торговый путь", desc: "Купцы просят охрану.", eff: { north: 6, nilfgaard: 6, magic: 0, witcher: 4 } },
        { title: "Проклятие Умы", desc: "Помочь Аваллак'ху.", eff: { north: -2, nilfgaard: -2, magic: 10, witcher: 8 } },
        { title: "Битва за мост", desc: "Сражение с Нильфгаардом.", eff: { north: 8, nilfgaard: -12, magic: -2, witcher: 6 } },
        { title: "Игра в гвинт", desc: "Ставка - влияние.", eff: { north: 5, nilfgaard: 5, magic: 2, witcher: 3 } },
        { title: "Убить короля", desc: "Заказ от Дийкстры.", eff: { north: 12, nilfgaard: -10, magic: -4, witcher: -2 } },
        { title: "Спасти чародея", desc: "Охота на магов.", eff: { north: -8, nilfgaard: 4, magic: 12, witcher: 4 } },
        { title: "Ведьмачьи тренировки", desc: "Молодые ведьмаки.", eff: { north: 0, nilfgaard: -2, magic: 4, witcher: 14 } },
        { title: "Суд над дезертиром", desc: "Военный трибунал.", eff: { north: 7, nilfgaard: -5, magic: 2, witcher: 0 } },
        { title: "Эпидемия в Вызиме", desc: "Чума косит людей.", eff: { north: -10, nilfgaard: -10, magic: 5, witcher: 5 } },
        { title: "Свадьба в Белом Саду", desc: "Праздник единения.", eff: { north: 6, nilfgaard: 6, magic: 4, witcher: 4 } },
        { title: "Кража рун", desc: "Магический артефакт украден.", eff: { north: -2, nilfgaard: -2, magic: -8, witcher: 8 } },
        { title: "Дракон в горах", desc: "Охота на золотого дракона.", eff: { north: -5, nilfgaard: -5, magic: 10, witcher: 12 } },
        { title: "Мятеж в Цинтре", desc: "Восстание против Империи.", eff: { north: 8, nilfgaard: -14, magic: 0, witcher: 4 } }
    ];

    let currentChoices = [];

    // DOM
    const northEl = document.getElementById('northVal');
    const nilfEl = document.getElementById('nilfVal');
    const magicEl = document.getElementById('magicVal');
    const witcherEl = document.getElementById('witcherVal');
    const yearEl = document.getElementById('yearDisplay');
    const crisisEl = document.getElementById('crisisDisplay');
    const eventLog = document.getElementById('eventLog');
    const endMsg = document.getElementById('endMsg');

    function updateUI(msg) {
        northEl.textContent = factions.north;
        nilfEl.textContent = factions.nilfgaard;
        magicEl.textContent = factions.magic;
        witcherEl.textContent = factions.witcher;
        yearEl.textContent = `Год ${year} / ${MAX_YEAR}`;
        crisisEl.textContent = currentCrisis ? `⚠️ ${currentCrisis}` : '⚔️ Время мира';
        if (msg) eventLog.innerHTML = msg;

        document.getElementById('medallionBtn').textContent = `🐺 Медальон (${artifacts.medallion})`;
        document.getElementById('swordBtn').textContent = `⚔️ Рунный меч (${artifacts.sword})`;
        document.getElementById('bookBtn').textContent = `📖 Книга чар (${artifacts.book})`;

        // Проверка проигрыша
        if (!gameOver && !gameWin) {
            for (let f in factions) {
                if (factions[f] <= 0) {
                    gameOver = true;
                    endMsg.innerHTML = `<div class="lose">💀 ${getFactionName(f)} потеряла влияние. Игра окончена.</div>`;
                    disableCards(true);
                    return;
                }
            }
        }

        // Проверка победы и концовки
        if (!gameWin && !gameOver && year > MAX_YEAR) {
            gameWin = true;
            const winner = getWinnerEnding();
            endMsg.innerHTML = `<div class="win">🏆 ${winner}</div>`;
            disableCards(true);
            return;
        }

        disableCards(gameOver || gameWin);
    }

    function getFactionName(key) {
        const map = { north: 'Север', nilfgaard: 'Нильфгаард', magic: 'Магия', witcher: 'Ведьмаки' };
        return map[key];
    }

    function getWinnerEnding() {
        const maxVal = Math.max(factions.north, factions.nilfgaard, factions.magic, factions.witcher);
        if (factions.north === maxVal) return 'Победа Севера! Королевства объединились.';
        if (factions.nilfgaard === maxVal) return 'Империя торжествует. Нильфгаард правит Континентом.';
        if (factions.magic === maxVal) return 'Магия восторжествовала. Ложа правит из тени.';
        return 'Ведьмаки сохранили нейтралитет. Мир хрупок.';
    }

    function checkCrisis() {
        if (year % 3 === 0 || year % 4 === 0) {
            const crises = [
                { name: 'Чума', eff: { north: -8, nilfgaard: -8, magic: 0, witcher: -4 } },
                { name: 'Война', eff: { north: -6, nilfgaard: -12, magic: -6, witcher: 0 } },
                { name: 'Охота на магов', eff: { north: 0, nilfgaard: 4, magic: -15, witcher: 4 } }
            ];
            const c = crises[Math.floor(Math.random() * crises.length)];
            currentCrisis = c.name;
            for (let f in c.eff) factions[f] = Math.min(100, Math.max(0, factions[f] + c.eff[f]));
            return `⚠️ КРИЗИС: ${c.name}!`;
        }
        currentCrisis = null;
        return null;
    }

    function disableCards(disabled) {
        document.getElementById('leftCard').classList.toggle('disabled', disabled);
        document.getElementById('rightCard').classList.toggle('disabled', disabled);
        document.getElementById('medallionBtn').disabled = disabled || artifacts.medallion <= 0;
        document.getElementById('swordBtn').disabled = disabled || artifacts.sword <= 0;
        document.getElementById('bookBtn').disabled = disabled || artifacts.book <= 0;
    }

    function drawCards() {
        if (gameOver || gameWin) return;
        let shuffled = [...deck].sort(() => Math.random() - 0.5);
        currentChoices = [shuffled[0], shuffled[1]];
        
        const left = currentChoices[0];
        document.getElementById('leftTitle').textContent = left.title;
        document.getElementById('leftDesc').textContent = left.desc;
        document.getElementById('leftEff').innerHTML = formatEffects(left.eff);
        
        const right = currentChoices[1];
        document.getElementById('rightTitle').textContent = right.title;
        document.getElementById('rightDesc').textContent = right.desc;
        document.getElementById('rightEff').innerHTML = formatEffects(right.eff);
    }

    function formatEffects(eff) {
        let html = '';
        for (let f in eff) {
            if (eff[f] === 0) continue;
            const sign = eff[f] > 0 ? '+' : '';
            const color = eff[f] > 0 ? '#6aff8a' : '#ff6a6a';
            const name = f === 'north' ? '🛡️' : (f === 'nilfgaard' ? '☀️' : (f === 'magic' ? '🔮' : '⚔️'));
            html += `<span style="color:${color}; margin:2px;">${name} ${sign}${eff[f]}</span>`;
        }
        return html || '—';
    }

    function makeChoice(index) {
        if (gameOver || gameWin) return;
        
        const card = currentChoices[index];
        for (let f in card.eff) factions[f] = Math.min(100, Math.max(0, factions[f] + card.eff[f]));
        
        year++;
        let msg = `Вы выбрали: ${card.title}. `;
        const crisisMsg = checkCrisis();
        if (crisisMsg) msg += crisisMsg;
        
        updateUI(msg);
        if (!gameOver && !gameWin) drawCards();
    }

    function useArtifact(type) {
        if (gameOver || gameWin || artifacts[type] <= 0) return;
        artifacts[type]--;
        if (type === 'medallion') { factions.witcher += 10; updateUI('🐺 Медальон Волка усилил Ведьмаков +10.'); }
        else if (type === 'sword') { factions.north += 8; factions.nilfgaard -= 4; updateUI('⚔️ Рунный меч помог Северу +8, Нильфгаард -4.'); }
        else if (type === 'book') { factions.magic += 12; updateUI('📖 Книга заклинаний усилила Магию +12.'); }
        drawCards();
    }

    function resetGame() {
        factions = { north: 50, nilfgaard: 50, magic: 50, witcher: 50 };
        artifacts = { medallion: 1, sword: 1, book: 1 };
        year = 1;
        gameOver = false;
        gameWin = false;
        currentCrisis = null;
        endMsg.innerHTML = '';
        updateUI('Новая игра. Балансируй влияние фракций.');
        drawCards();
    }

    resetGame();
</script>
</body>
    </html>
