<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚔️ Ведьмак: Тень Белого Волка</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 12px; background: #0a0c0f; color: #d4cfc4;
            font-family: 'Cinzel', 'Segoe UI', serif; min-height: 100vh;
            background-image: radial-gradient(circle at 20% 30%, #1a2a1f, #0a0c0f);
        }
        .game-container {
            max-width: 420px; margin: 0 auto; background: rgba(10, 15, 10, 0.95);
            border-radius: 32px; padding: 20px; border: 2px solid #5a6b4b;
            box-shadow: 0 0 30px rgba(0,0,0,0.9); backdrop-filter: blur(4px);
        }
        h2 {
            margin: 0 0 8px; color: #b9a57c; text-shadow: 2px 2px 0 #1e2a1a;
            display: flex; align-items: center; gap: 8px; font-size: 22px;
        }
        .witcher-icon { font-size: 28px; }
        .stats {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0;
        }
        .stat-card {
            background: #1c261c; padding: 10px; border-radius: 16px;
            border: 1px solid #6a7a5a; text-align: center;
        }
        .stat-name { font-size: 12px; color: #9aad8a; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 28px; font-weight: bold; color: #e0d4b2; }
        .hp-bar { color: #b34a4a; }
        .tox-bar { color: #6a9a5a; }

        .location-panel {
            background: #131c13; border-radius: 24px; padding: 16px; margin: 15px 0;
            border: 1px solid #7a8a6a; text-align: center;
        }
        .loc-name { font-size: 20px; font-weight: bold; color: #d4c49a; margin-bottom: 8px; }
        .loc-desc { font-size: 14px; color: #b0b89a; min-height: 40px; margin-bottom: 12px; }

        .action-buttons {
            display: flex; flex-direction: column; gap: 10px; margin: 16px 0;
        }
        .btn {
            background: #2a352a; border: 2px solid #7a9a5a; color: #efe0c0;
            padding: 14px; font-size: 16px; font-weight: bold; border-radius: 40px;
            cursor: pointer; transition: 0.15s; box-shadow: 0 5px 0 #1a261a;
            font-family: inherit; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #1a261a; }
        .btn.witcher-red { background: #4a2a2a; border-color: #b34a4a; box-shadow: 0 5px 0 #2a1a1a; }
        .btn.witcher-blue { background: #2a3a4a; border-color: #5a8aaa; box-shadow: 0 5px 0 #1a2a3a; }
        .btn:disabled { opacity: 0.5; transform: none; box-shadow: 0 5px 0 #1a261a; pointer-events: none; }

        .inventory {
            background: #1a221a; border-radius: 20px; padding: 12px; margin: 12px 0;
            border: 1px dashed #7a9a5a;
        }
        .inv-title { color: #b9a57c; margin-bottom: 8px; font-size: 14px; }
        .potion-btn {
            background: #2a352a; border: 1px solid #9aad8a; color: #efe0c0;
            padding: 8px 12px; margin: 4px; border-radius: 30px; font-size: 13px;
            cursor: pointer; display: inline-block;
        }

        .event-log {
            background: #0e130e; border-radius: 16px; padding: 14px; margin: 16px 0;
            border-left: 6px solid #b9a57c; font-size: 14px; max-height: 100px;
            overflow-y: auto; color: #c0c8b0;
        }
        .reset-btn {
            background: #1e261e; border: 1px solid #6a7a5a; color: #b0b89a;
            padding: 12px; font-size: 14px; width: 100%; margin-top: 8px;
        }
        .death-msg { color: #d44; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="game-container">
    <h2><span class="witcher-icon">🐺</span> ВЕДЬМАК: ТЕНЬ БЕЛОГО ВОЛКА</h2>
    
    <!-- СТАТЫ -->
    <div class="stats">
        <div class="stat-card"><span class="stat-name">❤️ Здоровье</span> <span class="stat-value hp-bar" id="hpVal">40</span></div>
        <div class="stat-card"><span class="stat-name">🧪 Токсичность</span> <span class="stat-value tox-bar" id="toxVal">0/100</span></div>
    </div>

    <!-- ЛОКАЦИЯ -->
    <div class="location-panel">
        <div class="loc-name" id="locName">🏡 Белый Сад</div>
        <div class="loc-desc" id="locDesc">Деревня на окраине Темерии. Люди напуганы.</div>
    </div>

    <!-- ИНВЕНТАРЬ (ЭЛИКСИРЫ) -->
    <div class="inventory">
        <div class="inv-title">🧴 ЭЛИКСИРЫ</div>
        <div id="potionPanel">
            <button class="potion-btn" onclick="usePotion('swallow')">🐦 Ласточка (2)</button>
            <button class="potion-btn" onclick="usePotion('cat')">🐱 Кошка (1)</button>
            <button class="potion-btn" onclick="usePotion('thunder')">⚡ Гром (1)</button>
        </div>
    </div>

    <!-- ОСНОВНЫЕ ДЕЙСТВИЯ -->
    <div class="action-buttons">
        <button class="btn" id="exploreBtn" onclick="explore()">🔍 ИССЛЕДОВАТЬ</button>
        <button class="btn witcher-red" id="fightBtn" onclick="enterFight()">⚔️ ВСТУПИТЬ В БОЙ</button>
        <button class="btn witcher-blue" id="meditateBtn" onclick="meditate()">🕯️ МЕДИТАЦИЯ</button>
    </div>

    <!-- СМЕНА ЛОКАЦИИ -->
    <div style="display: flex; gap: 8px; margin-top: 8px;">
        <button class="btn" style="flex:1; padding: 10px; font-size: 13px;" onclick="changeLocation('village')">🏡 Деревня</button>
        <button class="btn" style="flex:1; padding: 10px; font-size: 13px;" onclick="changeLocation('forest')">🌲 Лес</button>
        <button class="btn" style="flex:1; padding: 10px; font-size: 13px;" onclick="changeLocation('cave')">🕯️ Пещера</button>
    </div>

    <!-- ЖУРНАЛ -->
    <div class="event-log" id="eventLog">Вы в Белом Саду. Слухи о чудовищах...</div>

    <!-- СБРОС -->
    <button class="reset-btn" onclick="resetGame()">🔄 НАЧАТЬ ПУТЬ ЗАНОВО</button>
    <div id="deathMsg" class="death-msg"></div>
</div>

<script>
    // ---------- СОСТОЯНИЕ ВЕДЬМАКА ----------
    let hp = 40, maxHp = 40;
    let toxicity = 0;
    let location = 'village'; // village, forest, cave
    
    // Эликсиры
    let potions = { swallow: 2, cat: 1, thunder: 1 };
    
    // Флаги квестов
    let villageQuestDone = false;
    let monsterInCave = true;
    
    let gameOver = false;

    // DOM
    const hpEl = document.getElementById('hpVal');
    const toxEl = document.getElementById('toxVal');
    const locNameEl = document.getElementById('locName');
    const locDescEl = document.getElementById('locDesc');
    const eventLogEl = document.getElementById('eventLog');
    const deathMsgEl = document.getElementById('deathMsg');

    // Локации
    const locations = {
        village: { name: '🏡 Белый Сад', desc: 'Деревня. Жители боятся монстра из леса.' },
        forest: { name: '🌲 Дремучий лес', desc: 'Сосны, волки, и что-то похуже.' },
        cave: { name: '🕯️ Забытая пещера', desc: 'Темно. Пахнет гнилью и серой.' }
    };

    // ---------- ОБНОВЛЕНИЕ UI ----------
    function updateUI(msg) {
        hpEl.textContent = hp;
        toxEl.textContent = toxicity + '/100';
        locNameEl.textContent = locations[location].name;
        locDescEl.textContent = locations[location].desc;
        if (msg) eventLogEl.innerHTML = msg;
        
        // Смерть
        if (!gameOver && hp <= 0) {
            gameOver = true;
            deathMsgEl.innerHTML = '💀 Ведьмак погиб... Судьба настигла его.';
            eventLogEl.innerHTML = 'Вы мертвы. Нажмите "Начать путь заново".';
        }
        if (toxicity >= 100) {
            hp = Math.max(0, hp - 15);
            toxicity = 80;
            updateUI('🧪 Сильное отравление! Вы теряете 15 HP.');
        }
        if (hp > maxHp) hp = maxHp;
        
        // Обновить кнопки эликсиров
        document.querySelectorAll('.potion-btn').forEach((btn, idx) => {
            const type = idx === 0 ? 'swallow' : (idx === 1 ? 'cat' : 'thunder');
            btn.textContent = `${type === 'swallow' ? '🐦 Ласточка' : (type === 'cat' ? '🐱 Кошка' : '⚡ Гром')} (${potions[type]})`;
            btn.disabled = gameOver || potions[type] <= 0;
        });
        
        const btns = ['exploreBtn', 'fightBtn', 'meditateBtn'];
        btns.forEach(id => { if(document.getElementById(id)) document.getElementById(id).disabled = gameOver; });
    }

    // Случайное число
    function rnd(max) { return Math.floor(Math.random() * max); }

    // ---------- МЕХАНИКИ ----------
    function changeLocation(loc) {
        if(gameOver) return;
        location = loc;
        let msg = `Вы направились в ${locations[loc].name}.`;
        if(loc === 'forest' && !villageQuestDone) msg += ' Староста просил убить чудовище.';
        updateUI(msg);
    }

    function explore() {
        if(gameOver) return;
        let msg = '';
        if(location === 'village') {
            if(!villageQuestDone) {
                msg = 'Староста: "Убей Мглистого в пещере, заплачу 50 крон!" Вы получили зелье Ласточки.';
                potions.swallow++;
                villageQuestDone = true;
            } else msg = 'Жители благодарят вас, но новых заказов нет.';
        } else if(location === 'forest') {
            let r = rnd(3);
            if(r === 0) { msg = 'Вы нашли травы. Токсичность -10.'; toxicity = Math.max(0, toxicity-10); }
            else if(r === 1) { msg = 'Волки! Вы отбились, но получили раны. -5 HP.'; hp = Math.max(0, hp-5); }
            else { msg = 'Вы нашли бутылку с "Кошкой".'; potions.cat++; }
        } else if(location === 'cave') {
            if(monsterInCave) msg = 'В глубине пещеры что-то рычит...';
            else msg = 'Пусто. Только кости.';
        }
        updateUI(msg);
    }

    function enterFight() {
        if(gameOver) return;
        if(location === 'cave' && monsterInCave) {
            // БОЙ С БОССОМ
            let dmg = rnd(15)+10;
            hp = Math.max(0, hp - dmg);
            let msg = `🐉 МГЛИСТЫЙ атакует! Вы получили ${dmg} урона. `;
            if(hp > 0) {
                msg += 'Вы нанесли ответный удар! Чудовище повержено. Вы нашли Гром.';
                potions.thunder++;
                monsterInCave = false;
                toxicity = Math.min(100, toxicity+15);
            }
            updateUI(msg);
        } else {
            let r = rnd(3);
            if(r === 0) { hp = Math.max(0, hp-8); updateUI('Утопец оцарапал вас. -8 HP.'); }
            else if(r === 1) { hp = Math.max(0, hp-4); updateUI('Вы убили гуля. -4 HP.'); }
            else { updateUI('Вы не нашли противников.'); }
        }
    }

    function meditate() {
        if(gameOver) return;
        let heal = 10 + rnd(10);
        hp = Math.min(maxHp, hp + heal);
        toxicity = Math.max(0, toxicity - 20);
        updateUI(`🕯️ Медитация восстановила ${heal} HP и снизила токсичность.`);
    }

    function usePotion(type) {
        if(gameOver || potions[type] <= 0) return;
        potions[type]--;
        if(type === 'swallow') { hp = Math.min(maxHp, hp+20); toxicity += 25; }
        else if(type === 'cat') { hp = Math.min(maxHp, hp+10); toxicity += 10; }
        else if(type === 'thunder') { hp = Math.min(maxHp, hp+30); toxicity += 40; }
        updateUI(`Выпито: ${type}.`);
    }

    function resetGame() {
        hp = 40; toxicity = 0; location = 'village';
        potions = { swallow: 2, cat: 1, thunder: 1 };
        villageQuestDone = false; monsterInCave = true;
        gameOver = false; deathMsgEl.innerHTML = '';
        updateUI('Новое приключение начинается...');
    }

    // Старт
    updateUI('Вы в Белом Саду. Слухи о чудовищах...');
</script>
</body>
                </html>
